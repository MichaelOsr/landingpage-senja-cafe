    <!-- Structured data: Local Business -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "CafeOrCoffeeShop",
      "name": "Senja Coffee House",
      "description": "Senja Coffee House serves single-origin specialty coffee, roasted in-house and brewed with care. Cozy seats, warm light, and pastries baked fresh daily.",
      "url": "https://senja-cafe.vercel.app/",
      "telephone": "+6281234567890",
      "email": "hello@senjacoffee.id",
      "image": "https://images.unsplash.com/photo-1561882468-9110e03e0f78?fm=jpg&q=80&w=1200&auto=format&fit=crop",
      "priceRange": "Rp 26K – Rp 38K",
      "servesCuisine": ["Specialty Coffee", "Pastries"],
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Jl. Cemara Indah No. 24",
        "addressLocality": "Blitar",
        "addressRegion": "Jawa Timur",
        "postalCode": "66131",
        "addressCountry": "ID"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": "-8.0953",
        "longitude": "112.1608"
      },
      "hasMap": "https://www.google.com/maps/search/?api=1&query=Blitar+coffee",
      "openingHoursSpecification": [
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday"],
          "opens": "07:00",
          "closes": "22:00"
        },
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": "Friday",
          "opens": "07:00",
          "closes": "23:00"
        },
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": "Saturday",
          "opens": "08:00",
          "closes": "23:00"
        },
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": "Sunday",
          "opens": "08:00",
          "closes": "21:00"
        }
      ],
      "sameAs": [
        "https://instagram.com",
        "https://facebook.com"
      ]
    }
    </script>

    <!-- Fonts: preconnect + display=swap keeps text painting fast (no FOIT). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Shantell+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
    />

    <!--
      Anti-FOUC: set the <html lang> before React renders so the page never
      flashes the wrong language. Keep in sync with src/hooks/useLanguage.ts.
    -->
    <script>
      ;(() => {
        try {
          const lang = localStorage.getItem('lang')
          if (lang === 'en' || lang === 'id') {
            document.documentElement.lang = lang
          } else if (navigator.language && navigator.language.toLowerCase().startsWith('id')) {
            document.documentElement.lang = 'id'
          }
        } catch {
          /* ignore */
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
